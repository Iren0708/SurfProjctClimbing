name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vertical
          POSTGRES_USER: vertical
          POSTGRES_PASSWORD: vertical
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vertical -d vertical"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build and test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vertical
          SPRING_DATASOURCE_USERNAME: vertical
          SPRING_DATASOURCE_PASSWORD: vertical
        run: ./gradlew build --no-daemon

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('mobile/pubspec.yaml') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"
          cache: true

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Test
        working-directory: mobile
        run: flutter test

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: vertical-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  openapi:
    name: OpenAPI lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 01-analysis/api/package.json

      - name: Install and lint
        run: |
          npm --prefix 01-analysis/api install
          npm --prefix 01-analysis/api run lint
