spring:
  application:
    name: vertical-api
  datasource:
    url: jdbc:postgresql://localhost:5432/vertical
    username: vertical
    password: vertical
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

vertical:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-in-production-min-32-chars}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 2592000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
