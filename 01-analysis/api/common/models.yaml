# Сквозные объекты: общая схема ошибки, метаданные пагинации, переиспользуемые
# параметры запроса и типовые ответы-ошибки.
# Ссылки внутри файла: '#/components/<секция>/<Имя>'.

components:
  schemas:
    Error:
      type: object
      description: Стандартное тело ошибки.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: >-
            Канонический машинный код ошибки (R-023). Доменные коды: slot_full
            (нет свободных мест), rental_unavailable (нет прокатного снаряжения),
            double_booking (повторная бронь того же слота), slot_cancelled (слот
            отменён скалодромом), slot_started (тренировка уже началась),
            already_cancelled (бронь уже отменена), invalid_code (неверный/истёкший
            OTP). Идемпотентность: idempotency_key_conflict (повтор ключа с другим
            телом). Транспортные/общие: bad_request (400), unauthorized (401),
            forbidden (403), not_found (404), too_many_requests (429),
            internal_error (5xx).
          enum:
            - slot_full
            - rental_unavailable
            - double_booking
            - slot_cancelled
            - slot_started
            - already_cancelled
            - invalid_code
            - idempotency_key_conflict
            - bad_request
            - unauthorized
            - forbidden
            - not_found
            - too_many_requests
            - internal_error
          example: slot_full
        message:
          type: string
          description: Человекочитаемое сообщение об ошибке.
          example: Свободных мест больше нет.
        details:
          type: object
          description: >-
            Необязательные машиночитаемые детали для динамических сообщений на клиенте
            (foundations §6): актуальная доступность для UC-3 E1/E2.
          properties:
            available_seats:
              type: integer
              description: Сколько мест реально свободно на момент ошибки (для slot_full).
              example: 0
            available_rental_equipment:
              type: integer
              description: Сколько прокатных комплектов реально свободно (для rental_unavailable).
              example: 0

    PaginationMeta:
      type: object
      description: Метаданные постраничной выдачи.
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          description: Размер страницы.
          example: 20
        offset:
          type: integer
          description: Смещение от начала выборки.
          example: 0
        total:
          type: integer
          description: Общее число элементов.
          example: 42

  parameters:
    LimitParam:
      in: query
      name: limit
      required: false
      description: Максимальное число элементов в выдаче
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    OffsetParam:
      in: query
      name: offset
      required: false
      description: Смещение от начала выдачи
      schema:
        type: integer
        minimum: 0
        default: 0

    SlotIdParam:
      in: path
      name: slotId
      required: true
      description: Идентификатор слота (тренировки)
      schema:
        type: string
        format: uuid

    BookingIdParam:
      in: path
      name: bookingId
      required: true
      description: Идентификатор бронирования
      schema:
        type: string
        format: uuid

    BookingStatusParam:
      in: query
      name: status
      required: false
      style: form
      explode: true
      description: >-
        Фильтр броней по статусу (множественный выбор, OR внутри группы), R-025.
        Без параметра возвращаются брони всех статусов, включая cancelled,
        late_cancel и club_cancelled.
      schema:
        type: array
        items:
          type: string
          enum:
            - active
            - cancelled
            - late_cancel
            - club_cancelled

    DateFromParam:
      in: query
      name: date_from
      required: false
      description: >-
        Фильтр: слоты со стартом не раньше указанного момента (граница
        включительна), R-026. По умолчанию — текущий момент (R-027).
      schema:
        type: string
        format: date-time

    DateToParam:
      in: query
      name: date_to
      required: false
      description: >-
        Фильтр: слоты со стартом не позже указанного момента (граница
        включительна), R-026. По умолчанию — date_from + 7 дней (R-027).
      schema:
        type: string
        format: date-time

    ZoneFormatTypeParam:
      in: query
      name: zone_format_type
      required: false
      style: form
      explode: true
      description: >-
        Тип тренировки / зоны (множественный выбор, BS-001). Значения внутри
        группы объединяются по OR; между разными группами фильтров
        (zone_format_type, instructor_id) — AND (R-026).
      schema:
        type: array
        items:
          type: string
          enum:
            - novice
            - experienced

    InstructorIdParam:
      in: query
      name: instructor_id
      required: false
      style: form
      explode: true
      description: >-
        Идентификаторы инструкторов (множественный выбор, BS-001). Значения внутри
        группы объединяются по OR; между разными группами фильтров — AND (R-026).
      schema:
        type: array
        items:
          type: string
          format: uuid

    OnlyAvailableParam:
      in: query
      name: only_available
      required: false
      description: Только слоты со свободными местами (free_seats > 0). По умолчанию false — показываются все.
      schema:
        type: boolean
        default: false

  responses:
    BadRequest:
      description: Неверные параметры запроса (например, неизвестное значение equipment).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: bad_request
            message: Неверные параметры запроса. Проверьте корректность переданных значений.

    Unauthorized:
      description: Отсутствует или неверен токен авторизации.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: unauthorized
            message: Требуется авторизация. Передайте действительный токен в заголовке Authorization.

    Forbidden:
      description: Попытка доступа к чужим данным.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: forbidden
            message: Доступ запрещён. Вы не можете обращаться к данным другого клиента.

    NotFound:
      description: Запрашиваемый ресурс не найден.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: not_found
            message: Запрашиваемый ресурс не найден.

    Conflict:
      description: >-
        Нарушение инварианта — нет свободных мест (slot_full), нет прокатного
        снаряжения (rental_unavailable), двойная бронь (double_booking), повторная
        отмена (already_cancelled) либо повтор Idempotency-Key с другим телом
        (idempotency_key_conflict, R-022).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            slot_full:
              value:
                code: slot_full
                message: На выбранной тренировке не осталось свободных мест.
                details:
                  available_seats: 0
                  available_rental_equipment: 3
            rental_unavailable:
              value:
                code: rental_unavailable
                message: Прокатное снаряжение закончилось.
                details:
                  available_seats: 5
                  available_rental_equipment: 0
            double_booking:
              value:
                code: double_booking
                message: Вы уже записаны на эту тренировку.

    Gone:
      description: Слот отменён скалодромом (status=cancelled).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: slot_cancelled
            message: Тренировка отменена скалодромом и недоступна для записи.

    UnprocessableEntity:
      description: Операция невозможна по бизнес-правилу — например, тренировка уже началась.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: slot_started
            message: Тренировка уже началась, отмена недоступна.

    TooManyRequests:
      description: >-
        Слишком частые запросы — превышен лимит отправки SMS-кодов. Повторить можно
        не раньше resend_after_seconds (см. ответ запроса кода).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: too_many_requests
            message: Слишком много запросов. Повторите попытку позже.

    InternalError:
      description: Внутренняя ошибка сервиса.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: internal_error
            message: Что-то пошло не так. Попробуйте ещё раз позже.
