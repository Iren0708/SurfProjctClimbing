# Слот (групповая тренировка) — read-only-проекция и его представления.
# Ссылки: '#/components/schemas/...' — внутри файла;
# '../instructors/...' и '../common/...' — на соседние домены.

components:
  schemas:
    SlotStatus:
      type: string
      description: Статус слота.
      enum:
        - scheduled
        - cancelled

    Slot:
      type: object
      description: >-
        Полная карточка слота (конкретная тренировка на дату/время). Доступен только
        для чтения (NFR-2). Статус «Прошедшая» — производное значение по полю start_at,
        отдельным статусом не хранится.


        Доступность (FR-9): запись на одно место доступна при free_seats > 0.
        Прокатное снаряжение доступно при free_rental_equipment > 0 и выборе
        equipment=rental при бронировании. Своё снаряжение занимает место в группе,
        но не расходует прокатный фонд (FR-8).


        Цены (FR-11): price — тариф за одно место, rental_price — доплата за прокатный
        комплект (скальники + страховочная система), оба в рублях (RUB). Итоговая цена
        брони: price при equipment=own; price + rental_price при equipment=rental (R-005).


        Инварианты: free_seats ≤ total_seats ≤ zone_format.capacity_cap; счётчики и
        цены неотрицательны.
      required:
        - id
        - start_at
        - zone_format
        - instructor_info
        - total_seats
        - free_seats
        - free_rental_equipment
        - price
        - rental_price
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор слота.
        start_at:
          type: string
          format: date-time
          description: Дата и время начала тренировки (UTC, источник истины — сервер).
        zone_format:
          $ref: '../instructors/models.yaml#/components/schemas/ZoneFormat'
        instructor_info:
          $ref: '../instructors/models.yaml#/components/schemas/Instructor'
        total_seats:
          type: integer
          minimum: 1
          description: Общее число мест в слоте.
          example: 8
        free_seats:
          type: integer
          minimum: 0
          description: Число свободных мест (расчётное). К записи доступно одно место при free_seats > 0.
          example: 5
        free_rental_equipment:
          type: integer
          minimum: 0
          description: >-
            Число свободных прокатных комплектов снаряжения (расчётное). Ограничивает
            выбор equipment=rental при бронировании. Своё снаряжение фонд не расходует (FR-8).
          example: 4
        price:
          type: integer
          minimum: 0
          description: Цена за одно место, в рублях (целое число, валюта RUB).
          example: 1200
        rental_price:
          type: integer
          minimum: 0
          description: Доплата за прокатный комплект снаряжения, в рублях (целое число, RUB).
          example: 400
        status:
          $ref: '#/components/schemas/SlotStatus'

    SlotSummary:
      type: object
      description: Урезанное представление слота для списка (SCR-002).
      required:
        - id
        - start_at
        - zone_format
        - instructor_info
        - price
        - rental_price
        - total_seats
        - free_seats
        - free_rental_equipment
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор слота.
        start_at:
          type: string
          format: date-time
          description: Дата и время начала тренировки.
        zone_format:
          $ref: '../instructors/models.yaml#/components/schemas/ZoneFormat'
        instructor_info:
          $ref: '../instructors/models.yaml#/components/schemas/Instructor'
        price:
          type: integer
          minimum: 0
          description: Цена за одно место, в рублях.
          example: 1200
        rental_price:
          type: integer
          minimum: 0
          description: Доплата за прокатный комплект, в рублях.
          example: 400
        total_seats:
          type: integer
          minimum: 1
          description: Общее число мест в слоте.
          example: 8
        free_seats:
          type: integer
          minimum: 0
          description: Число свободных мест.
          example: 5
        free_rental_equipment:
          type: integer
          minimum: 0
          description: Число свободных прокатных комплектов.
          example: 4
        status:
          $ref: '#/components/schemas/SlotStatus'

    SlotListResponse:
      type: object
      description: Постраничный список слотов (SCR-002).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка слотов.
          items:
            $ref: '#/components/schemas/SlotSummary'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'
