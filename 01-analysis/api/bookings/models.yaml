# Бронь и её представления.
# Ссылки: '#/components/schemas/...' — внутри файла;
# '../slots/...' и '../common/...' — на соседние домены.

components:
  schemas:
    Equipment:
      type: string
      description: >-
        Вариант снаряжения при записи на одно место (FR-7). own — своё снаряжение
        (занимает место в группе, прокатный фонд не расходует); rental — прокатный
        комплект клуба (скальники + страховочная система).
      enum:
        - own
        - rental

    BookingStatus:
      type: string
      description: >-
        Статус брони. late_cancel — поздняя отмена (менее 2 часов до начала):
        место и прокатный комплект НЕ освобождаются. club_cancelled — «Отменена
        скалодромом»: слот снят (Slot.status = cancelled), бронь отменена не по
        инициативе клиента (R-008, FR-16).
      enum:
        - active
        - cancelled
        - late_cancel
        - club_cancelled

    CreateBookingRequest:
      type: object
      description: >-
        Запрос на создание брони одного места (FR-6). Групповая бронь нескольких
        людей одним аккаунтом не поддерживается (FR-W1).
      required:
        - slot_id
        - equipment
      properties:
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота.
        equipment:
          $ref: '#/components/schemas/Equipment'

    Booking:
      type: object
      description: >-
        Полные данные брони для экрана деталей (SCR-006). Тарифы (price за место,
        rental_price за прокат) лежат в booking.slot; на уровне брони — только
        производное price_total (R-005).
      required:
        - id
        - slot_id
        - client_id
        - equipment
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота, на который оформлена бронь.
        client_id:
          type: string
          format: uuid
          description: Идентификатор клиента, оформившего бронь.
        equipment:
          $ref: '#/components/schemas/Equipment'
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: >-
            Производное поле только для чтения, в рублях (RUB). При equipment=own:
            slot.price; при equipment=rental: slot.price + slot.rental_price (R-005).
            Фиксируется на момент создания брони.
          readOnly: true
          example: 1600
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены, если бронь была отменена.
        cancellation_reason:
          type: string
          nullable: true
          readOnly: true
          description: >-
            Причина отмены. Заполняется при club_cancelled (текст от скалодрома,
            напр. «Профилактика зоны»); для cancelled/late_cancel и active — null
            (R-008, FR-16).
          example: Профилактика болдеринговой зоны
        slot:
          $ref: '../slots/models.yaml#/components/schemas/Slot'

    CreateBookingResponse:
      type: object
      description: >-
        Ответ на создание брони (R-006). Полные данные брони плюс признак первой
        брони клиента и параметры напоминания для конфигурации push.
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          required:
            - is_first_booking
          properties:
            is_first_booking:
              type: boolean
              description: >-
                true, если это первая успешная бронь клиента (для запроса push на
                BS-002), R-006.
              example: true
            reminder_hours:
              type: array
              description: >-
                За сколько часов до старта слота клиенту будут отправлены
                напоминания (push). Канонический MVP-набор — [24, 2] (R-006, FR-17);
                значение задаётся сервером, клиент не хардкодит.
              items:
                type: integer
              example: [24, 2]

    BookingSummary:
      type: object
      description: Урезанное представление брони для списка (SCR-005).
      required:
        - id
        - slot_id
        - equipment
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота.
        equipment:
          $ref: '#/components/schemas/Equipment'
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: Итоговая цена брони в рублях (read-only, R-005).
          readOnly: true
          example: 1600
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены, если бронь была отменена.
        cancellation_reason:
          type: string
          nullable: true
          readOnly: true
          description: Причина отмены скалодромом (club_cancelled).
          example: Профилактика болдеринговой зоны
        slot:
          $ref: '../slots/models.yaml#/components/schemas/SlotSummary'

    BookingListResponse:
      type: object
      description: Постраничный список броней (SCR-005).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка броней.
          items:
            $ref: '#/components/schemas/BookingSummary'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'
