# Зона/формат тренировки и инструктор — справочные объекты (read-only).
# Ссылки: '#/components/schemas/...' — внутри файла; '../common/...' — на сквозные объекты.

components:
  schemas:
    ZoneFormatType:
      type: string
      description: Тип тренировки — новичковый (болдеринг) или опытный (трассы).
      enum:
        - novice
        - experienced

    ZoneFormat:
      type: object
      description: >-
        Зона / формат групповой тренировки. Справочник, доступен только для чтения
        (NFR-2). В слоте вложен как zone_format.
      required:
        - id
        - name
        - type
        - capacity_cap
        - duration_min
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор зоны/формата.
        name:
          type: string
          description: Название зоны/формата.
          example: Болдеринг с инструктажем
        description:
          type: string
          nullable: true
          description: >-
            Описательный текст для карточки слота (SCR-003). Опционально; может
            отсутствовать или быть null.
          example: >-
            Групповое занятие на болдеринговой стене с разбором техники для новичков.
        type:
          $ref: '#/components/schemas/ZoneFormatType'
        capacity_cap:
          type: integer
          description: Потолок числа мест. Новичковый — не более 8, опытный — не более 16.
          example: 8
        duration_min:
          type: integer
          description: Продолжительность тренировки в минутах (обычно ≈ 90).
          example: 90

    ZoneFormatListResponse:
      type: object
      description: Постраничный список зон/форматов (справочник).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы справочника зон/форматов.
          items:
            $ref: '#/components/schemas/ZoneFormat'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'

    Instructor:
      type: object
      description: Инструктор, ведущий тренировку. В слоте вложен как instructor_info (NFR-4).
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор инструктора.
        name:
          type: string
          description: Имя инструктора.
          example: Анна

    InstructorListResponse:
      type: object
      description: Постраничный список инструкторов (справочник для фильтра, BS-001).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка инструкторов.
          items:
            $ref: '#/components/schemas/Instructor'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'
