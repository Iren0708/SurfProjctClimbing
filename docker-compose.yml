# Локальная инфраструктура «Вертикаль»
# Запуск: docker compose up -d
# Только БД: docker compose up -d postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: vertical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vertical}
      POSTGRES_USER: ${POSTGRES_USER:-vertical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vertical}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vertical} -d ${POSTGRES_DB:-vertical}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vertical-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vertical}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-vertical}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vertical}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production-min-32-chars}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  postgres_data:
